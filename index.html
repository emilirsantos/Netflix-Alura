<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alura x Netflix</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
  </head>
  <body>
    <main>
      <label class="theme-toggle" aria-label="Toggle theme">
        <input type="checkbox" id="themeToggle" />
        <span class="track">
          <span class="thumb"></span>
          <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="4" />
            <line x1="12" y1="2" x2="12" y2="5" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="2" y1="12" x2="5" y2="12" />
            <line x1="19" y1="12" x2="22" y2="12" />
            <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
            <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
            <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
          </svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </span>
      </label>
      <h1>Who's watching?</h1>
      <section aria-label="Available Profiles">
        <nav class="profiles">
          <ul>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 1.jpg" alt="Profile 1" />
                  <figcaption>Frieren</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 2.jpg" alt="Profile 2" />
                  <figcaption>Himmel</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 3.jpg" alt="Profile 3" />
                  <figcaption>Fern</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 4.jpg" alt="Profile 4" />
                  <figcaption>Stark</figcaption>
                </figure>
              </a>
            </li>
          </ul>
        </nav>
      </section>
    </main>
    <script src="js/darkmode.js"></script>
  </body>
</html>
