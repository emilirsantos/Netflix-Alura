<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alura x Netflix</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png " href="assets/favicon.png"
</head>
<body>
  <main>
    <h1>Who's watching?</h1>
    <section aria-label="profile">
      <nav class="profiles">
        <a href="#" class="profile">
          <figure>
            <img src="/assets/Profile 1.jpg" alt="Profile picture 1">
            <figcaption>Frieren</figcaption>
          </figure>
        </a>
        <a href="#" class="profile">
          <figure>
            <img src="/assets/Profile 2.jpg" alt="Profile picture 2">
            <figcaption>Himmel</figcaption>
          </figure>
        </a>
        <a href="#" class="profile">
          <figure>
            <img src="/assets/Profile 3.jpg" alt="Profile picture 3">
            <figcaption>Fern</figcaption>
          </figure>
        </a>
        <a href="#" class="profile">
          <figure>
            <img src="/assets/Profile 4.jpg" alt="Profile picture 4">
            <figcaption>Stark</figcaption>
          </figure>
        </a>
      </nav>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
