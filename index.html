<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alura x Netflix</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
  </head>
  <body>
    <main>
      <h1>Who's watching?</h1>
      <section aria-label="Available Profiles">
        <nav class="profiles">
          <ul>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 1.jpg" alt="Profile 1" />
                  <figcaption>Frieren</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 2.jpg" alt="Profile 2" />
                  <figcaption>Himmel</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 3.jpg" alt="Profile 3" />
                  <figcaption>Fern</figcaption>
                </figure>
              </a>
            </li>
            <li>
              <a href="#" class="profile">
                <figure>
                  <img src="assets/Profile 4.jpg" alt="Profile 4" />
                  <figcaption>Stark</figcaption>
                </figure>
              </a>
            </li>
          </ul>
        </nav>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
